    <div class="byl" id="byl"></div>
  </header>

  <div class="depthbar">
    <div class="dbin">
      <span class="dblab">Read at your altitude</span>
      <div class="seg" id="seg">

        <button data-l="1">Curious · 5m</button>
        <button data-l="2">Deep · 15m</button>
      </div>
    </div>
  </div>

  <article>
    <div class="lvltag" id="lvltag">The Glance</div>
    <div class="body" id="abody"></div>
  </article>

  <section class="sources" id="sources" aria-label="Sources and further reading" hidden></section>

  <a class="nextseries" id="nextseries" href="/" hidden>
    <span class="ns-lab">Next in the Discovery Series</span>

    </span>

    <div class="rgrid" id="rgrid"></div>
