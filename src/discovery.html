<style>
  :root{
    --void:#050609;--deep:#0a0c12;--panel:#10131c;--panel2:#161a25;
    --ink:#f3f5fb;--mut:#9aa2b4;--dim:#5a6273;--faint:#363c4a;
    --line:rgba(243,245,251,.12);--line-soft:rgba(243,245,251,.06);
    --accent:#a9bcff;--accent-dim:rgba(169,188,255,.16);--star:#f2e6c4;
    --display:'Fraunces',Georgia,serif;--body:'Spectral',Georgia,serif;
    --mono:'IBM Plex Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
  body{background:var(--void);color:var(--ink);font-family:var(--body);font-weight:300;
    line-height:1.7;overflow-x:hidden;-webkit-font-smoothing:antialiased}
  ::selection{background:var(--accent);color:#06070b}
  a{color:inherit;text-decoration:none}
  h1,h2,h3{font-family:var(--display);font-weight:400;line-height:1.06;letter-spacing:-.02em;font-optical-sizing:auto}
  canvas#sky{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}
  .grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.035;mix-blend-mode:screen;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='140' height='140'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.85' numOctaves='2'/></filter><rect width='140' height='140' filter='url(%23n)' opacity='.55'/></svg>")}
  main{position:relative;z-index:2}

  #prog{position:fixed;top:0;left:0;height:2px;width:0;z-index:60;
    background:linear-gradient(90deg,var(--accent),var(--star));box-shadow:0 0 14px var(--accent)}
  nav{position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;
    padding:16px 32px;background:rgba(5,6,9,.7);backdrop-filter:blur(14px);border-bottom:1px solid var(--line-soft)}
  .brand{display:flex;align-items:center;gap:12px;font-family:var(--display);font-size:18px;letter-spacing:.16em;font-weight:600}
  .mark{width:28px;height:28px}
  .back{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--mut);transition:.3s}
  .back:hover{color:var(--ink)}.back span{display:inline-block;transition:.3s;margin-right:8px}
  .back:hover span{transform:translateX(-5px)}

  .ahero{max-width:1100px;margin:0 auto;padding:200px 32px 70px;display:grid;grid-template-columns:1.15fr .85fr;gap:60px;align-items:center}
  @media(max-width:920px){.ahero{grid-template-columns:1fr;padding-top:150px;gap:36px}}
  .kick{font-family:var(--mono);font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:var(--accent)}
  .ahero h1{font-size:clamp(2.5rem,6vw,5rem);font-weight:300;margin:24px 0 26px;letter-spacing:-.025em}
  .ahero h1 i{font-style:italic;color:var(--mut)}
  .dek{font-size:clamp(1.08rem,1.7vw,1.32rem);color:var(--mut);max-width:46ch;line-height:1.65}
  .byl{display:flex;gap:26px;flex-wrap:wrap;margin-top:34px;font-family:var(--mono);font-size:11px;
    letter-spacing:.12em;color:var(--dim);text-transform:uppercase}
  .byl b{color:var(--mut);font-weight:400}
  .heroart{aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative}

  .v-bh{width:78%;aspect-ratio:1;border-radius:50%;position:relative}

  /* Black hole hero responsiveness - only for black hole articles */
  .ahero.black-hole-hero {
    position: relative;
  }

  @media (max-width: 1024px) {
    .ahero.black-hole-hero {
      padding-top: 140px;
      padding-bottom: 40px;
    }

    .ahero.black-hole-hero > div:first-child {
      position: relative;
      z-index: 3;
    }

    .ahero.black-hole-hero .heroart {
      position: absolute;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: clamp(220px, 52vw, 380px);
      z-index: 1;
      opacity: 0.75;
      pointer-events: none;
    }

    .ahero.black-hole-hero .v-bh {
      width: 100% !important;
    }
  }

  @media (max-width: 640px) {
    .ahero.black-hole-hero .heroart {
      width: clamp(180px, 58vw, 280px);
      top: 10px;
      opacity: 0.55;
    }
  }
  .v-bh .disk{position:absolute;inset:-26%;border-radius:50%;filter:blur(13px);opacity:.85;
    background:conic-gradient(from 30deg,transparent,rgba(242,230,196,.05),var(--star) 60%,rgba(169,188,255,.55),transparent 78%);
    animation:spin 16s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .v-bh .core{position:absolute;inset:0;border-radius:50%;background:#000;
    box-shadow:0 0 0 1px rgba(255,255,255,.08),inset 0 0 70px #000,0 0 90px rgba(169,188,255,.2)}
  .v-bh .ring{position:absolute;inset:-2%;border-radius:50%;border:1px solid rgba(242,230,196,.4);filter:blur(1px)}
  .v-wave{width:84%;aspect-ratio:1;position:relative;display:flex;align-items:center;justify-content:center}
  .v-wave i{position:absolute;border-radius:50%;border:1px solid rgba(169,188,255,.45);inset:46%;animation:rip 4s linear infinite}
  .v-wave i:nth-child(2){animation-delay:1s}.v-wave i:nth-child(3){animation-delay:2s}.v-wave i:nth-child(4){animation-delay:3s}
  @keyframes rip{0%{inset:46%;opacity:0}10%{opacity:1}100%{inset:0;opacity:0}}
  .v-wave b{width:14px;height:14px;border-radius:50%;background:var(--ink);box-shadow:0 0 26px var(--accent)}
  .v-web{width:88%;aspect-ratio:1}
  .v-web svg{width:100%;height:100%}
  .v-web .nd{fill:var(--accent)}.v-web .fl{stroke:rgba(169,188,255,.3);stroke-width:1}
  .v-web .gl{fill:none;stroke:rgba(243,245,251,.06);stroke-width:1}

  .depthbar{position:sticky;top:61px;z-index:40;background:rgba(5,6,9,.82);backdrop-filter:blur(14px);
    border-top:1px solid var(--line-soft);border-bottom:1px solid var(--line-soft)}
  .dbin{max-width:760px;margin:0 auto;padding:16px 32px;display:flex;align-items:center;justify-content:space-between;gap:20px}
  .dblab{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--dim)}
  @media(max-width:560px){.dblab{display:none}}
  .seg{display:flex;border:1px solid var(--line-soft);border-radius:3px;padding:4px}
  .seg button{font-family:var(--mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--mut);
    background:none;border:none;padding:11px 18px;border-radius:2px;cursor:pointer;transition:.35s;white-space:nowrap}
  .seg button.on{background:var(--ink);color:#06070b}
  .seg button:not(.on):hover{color:var(--ink)}
  @media(max-width:440px){.seg button{padding:10px 11px;font-size:10px;letter-spacing:.08em}}

  article{max-width:720px;margin:0 auto;padding:70px 32px 60px}
  .lvltag{font-family:var(--mono);font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:var(--accent);
    display:flex;align-items:center;gap:14px;margin-bottom:46px}
  .lvltag::after{content:"";flex:1;height:1px;background:var(--line-soft)}
  article h2{font-size:clamp(1.55rem,3.3vw,2.2rem);margin:60px 0 22px;letter-spacing:-.02em}
  article h2:first-child{margin-top:0}
  article p{font-size:1.15rem;line-height:1.82;color:#cfd4e1;font-weight:300;margin-bottom:26px;
    opacity:0;transform:translateY(14px);animation:fade .8s forwards}
  @keyframes fade{to{opacity:1;transform:none}}
  article strong{color:var(--ink);font-weight:500}
  .lead{font-family:var(--display);font-size:3.5em;line-height:.74;float:left;
    padding:8px 16px 0 0;color:var(--ink);font-weight:400}
  .pull{margin:54px 0;padding:0 0 0 30px;border-left:2px solid var(--accent);
    font-family:var(--display);font-size:clamp(1.45rem,3vw,2rem);font-weight:300;font-style:italic;
    color:var(--ink);line-height:1.36;letter-spacing:-.01em}
  .pull cite{display:block;font-family:var(--mono);font-size:11px;font-style:normal;letter-spacing:.2em;
    text-transform:uppercase;color:var(--dim);margin-top:20px}
  .know{margin:52px 0;border:1px solid var(--line-soft);border-radius:4px;background:rgba(16,19,28,.5);padding:32px 34px}
  .know .kh{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:var(--star);
    margin-bottom:16px;display:flex;align-items:center;gap:12px}
  .know .kh::before{content:"";width:7px;height:7px;border-radius:50%;background:var(--star);box-shadow:0 0 12px var(--star)}
  .know p{font-size:1.02rem;color:var(--mut);margin:0;animation:none;opacity:1;transform:none}
  .know.depthnote{border-color:var(--accent-dim)}
  .know.depthnote .kh{color:var(--accent)}
  .know.depthnote .kh::before{background:var(--accent);box-shadow:0 0 12px var(--accent)}
  figure{margin:56px 0}
  figure svg{width:100%;height:auto;display:block;border:1px solid var(--line-soft);border-radius:4px;background:rgba(10,12,18,.5)}
  figcaption{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--dim);margin-top:16px;text-align:center;line-height:1.6}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line-soft);
    border:1px solid var(--line-soft);border-radius:4px;overflow:hidden;margin:52px 0}
  .stats div{background:var(--void);padding:26px 22px;text-align:center}
  .stats .v{font-family:var(--display);font-size:clamp(1.5rem,3.4vw,2.3rem);font-weight:300;color:var(--ink)}
  .stats .l{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin-top:10px;line-height:1.5}
  @media(max-width:560px){.stats{grid-template-columns:1fr}}

  .related{max-width:1100px;margin:0 auto;padding:90px 32px;border-top:1px solid var(--line-soft)}
  .related .rh{font-family:var(--mono);font-size:11px;letter-spacing:.3em;text-transform:uppercase;color:var(--dim);margin-bottom:40px}
  .rgrid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:var(--line-soft);border:1px solid var(--line-soft)}
  @media(max-width:820px){.rgrid{grid-template-columns:1fr}}
  .rc{background:var(--void);padding:38px 32px;min-height:230px;display:flex;flex-direction:column;justify-content:space-between;transition:.5s;cursor:pointer}
  .rc:hover{background:var(--deep)}
  .rc .f{font-family:var(--mono);font-size:10px;letter-spacing:.26em;text-transform:uppercase;color:var(--accent)}
  .rc h3{font-size:1.45rem;margin:22px 0;color:var(--mut);transition:.4s;line-height:1.22}
  .rc:hover h3{color:var(--ink)}
  .rc .r{font-family:var(--mono);font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);transition:.4s}
  .rc:hover .r{color:var(--ink)}

  footer{border-top:1px solid var(--line-soft);padding:80px 0 46px}
  .fw{max-width:1100px;margin:0 auto;padding:0 32px;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:36px}
  .fw .big{font-family:var(--display);font-size:clamp(2rem,5vw,3.4rem);font-weight:300;letter-spacing:.04em;line-height:1}
  .fw .big i{font-style:italic;color:var(--mut)}
  .fw a{font-family:var(--mono);font-size:11px;letter-spacing:.22em;text-transform:uppercase;color:var(--mut);transition:.3s}
  .fw a:hover{color:var(--ink)}
  .legal{max-width:1100px;margin:54px auto 0;padding:26px 32px 0;border-top:1px solid var(--line-soft);
    font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:.1em}

  #burger{display:none;width:32px;height:32px;background:none;border:none;cursor:pointer;flex-direction:column;gap:7px;align-items:flex-end}
  #burger span{display:block;height:1.5px;background:var(--ink);transition:.4s}
  #burger span:first-child{width:24px}#burger span:last-child{width:16px}
  #burger.x span:first-child{transform:translateY(4px) rotate(45deg);width:24px}
  #burger.x span:last-child{transform:translateY(-4px) rotate(-45deg);width:24px}
  @media(max-width:720px){#burger{display:flex}.back{display:none}}
  #menu{position:fixed;inset:0;z-index:48;background:rgba(5,6,9,.97);backdrop-filter:blur(20px);
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;opacity:0;pointer-events:none;transition:.5s}
  #menu.open{opacity:1;pointer-events:all}
  #menu a{font-family:var(--display);font-size:8vw;color:var(--mut);transition:.35s;padding:6px}
  #menu a:hover{color:var(--ink)}
</style>
</head>

  </footer>

<script>
/* INDEX and the app logic below. CONTENT and FRAG are loaded dynamically
   from celestium-data.js at the start of the IIFE (single source of truth). */

var INDEX = {
  "black-hole-image":{field:"Cosmology",title:"We took a photograph of the unphotographable."},
  "gravitational-waves":{field:"Spacetime",title:"The night we heard two black holes collide."},
  "weighing-the-universe":{field:"Cosmology",title:"How we weighed the entire universe."},
  "__scale":{field:"Perspective",title:"Find where you sit in thirteen orders of magnitude.",href:"index.html#scale",cta:"Open the tool"}
};

(async function(){
  // Single source of truth: load from the canonical module
  const mod = await import('./celestium-data.js');
  var CONTENT = mod.DISCOVERIES || mod.default || window.CELESTIUM_CONTENT;
  var FRAG = mod.FRAG || window.CELESTIUM_FRAG;

  /* starfield */
  var c=document.getElementById('sky'),x=c.getContext('2d'),st=[],W,H;
  function size(){W=c.width=innerWidth;H=c.height=innerHeight;st=[];
    var n=Math.min(360,W*H/3800);
    for(var i=0;i<n;i++)st.push({x:Math.random()*W,y:Math.random()*H,z:Math.random(),r:Math.random()*1.2+.2,t:Math.random()*6.28});}
  size();addEventListener('resize',size);
  (function loop(){x.clearRect(0,0,W,H);var T=Date.now()/1000;
    for(var i=0;i<st.length;i++){var s=st[i],tw=.55+.45*Math.sin(T*1.3+s.t),a=(.16+s.z*.66)*tw;
      x.beginPath();x.arc(s.x,s.y,s.r*(.6+s.z),0,6.29);x.fillStyle='rgba(220,228,255,'+a+')';x.fill();}
    requestAnimationFrame(loop);})();

  var prog=document.getElementById('prog');
  function onScroll(){var h=document.documentElement.scrollHeight-innerHeight;
    prog.style.width=(h>0?scrollY/h*100:0)+'%';}
  addEventListener('scroll',onScroll,{passive:true});

  /* router: ?id=slug  (also accepts #slug) */
  function getId(){
    try{var u=new URLSearchParams(location.search).get('id');if(u&&CONTENT[u])return u;}catch(e){}
    var h=location.hash.replace(/^#/,'');
    if(h&&CONTENT[h])return h;
    return 'black-hole-image';
  }
  var id=getId(); var D=CONTENT[id]||CONTENT['black-hole-image'];

  /* hero */
  document.title=D.title.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()+' — Celestium';
  document.getElementById('kick').innerHTML=D.kick;
  document.getElementById('title').innerHTML=D.title;
  document.getElementById('dek').innerHTML=D.dek;
  document.getElementById('byl').innerHTML=
    '<span><b>Field</b> &nbsp;'+D.field+'</span>'+
    '<span><b>Era</b> &nbsp;'+D.era+'</span>'+
    '<span><b>Subject</b> &nbsp;'+D.subject+'</span>';
  var ha=document.getElementById('heroart');
  if(D.hero==='wave'){
    ha.innerHTML='<div class="v-wave"><i></i><i></i><i></i><i></i><b></b></div>';
  }else if(D.hero==='web'){
    var nodes=[[40,60],[150,48],[168,120],[96,166],[34,140],[110,96],[72,40],[130,150]];
    var edges=[[0,5],[1,5],[2,5],[3,5],[4,5],[5,6],[5,7],[0,6],[1,2],[3,4]];
    var g='';
    edges.forEach(function(e){g+='<line class="fl" x1="'+nodes[e[0]][0]+'" y1="'+nodes[e[0]][1]+'" x2="'+nodes[e[1]][0]+'" y2="'+nodes[e[1]][1]+'"/>';});
    nodes.forEach(function(q,i){g+='<circle class="nd" cx="'+q[0]+'" cy="'+q[1]+'" r="'+(i===5?5:3.4)+'"/>';});
    ha.innerHTML='<div class="v-web"><svg viewBox="0 0 200 200"><circle class="gl" cx="100" cy="100" r="86"/><circle class="gl" cx="100" cy="100" r="54"/>'+g+'</svg></div>';
  }else{
    ha.innerHTML='<div class="v-bh"><div class="disk"></div><div class="ring"></div><div class="core"></div></div>';
    // Mark the hero for responsive black hole treatment
    document.querySelector('.ahero')?.classList.add('black-hole-hero');
  }

  /* depth render */
  var TAGS=['The Glance — the essence in twenty seconds',
            'The Curious Read — the story, with the mechanism',
            'The Deep Dive — the full physics and the safeguards'];
  var body=document.getElementById('abody'),lt=document.getElementById('lvltag'),seg=document.getElementById('seg');
  body.style.transition='opacity .35s';
  function expand(arr){return arr.map(function(b){return FRAG[b]||b;}).join('');}
  function render(l){
    body.style.opacity=0;
    setTimeout(function(){
      body.innerHTML=expand(D.depths[l])+
        '<div class="know depthnote"><div class="kh">Same discovery · depth '+(l+1)+' of 3</div>'+
        '<p>This is the identical fact set, re-told at a different altitude. Switch any time — the reader keeps your place in the idea, not the prose.</p></div>';
      lt.textContent=TAGS[l];
      body.style.opacity=1;
      var n=0;
      body.querySelectorAll('p').forEach(function(p){
        if(p.closest('.know')||p.closest('.pull'))return;
        p.style.animation='none';p.offsetHeight;p.style.animation='fade .8s '+(n*0.04)+'s forwards';n++;});
      onScroll();
    },180);
  }
  seg.querySelectorAll('button').forEach(function(b){b.addEventListener('click',function(){
    seg.querySelectorAll('button').forEach(function(o){o.classList.remove('on');});
    b.classList.add('on');render(+b.dataset.l);
    var y=document.querySelector('article').getBoundingClientRect().top+scrollY-104;
    if(scrollY>y)scrollTo({top:y,behavior:'smooth'});});});
  render(0);

  /* related */
  var rg=document.getElementById('rgrid');
  (D.related||[]).forEach(function(rid){
    var m=INDEX[rid];if(!m)return;
    var href=m.href||('discovery.html?id='+rid);
    var a=document.createElement('a');a.className='rc';a.href=href;
    a.innerHTML='<div class="f">'+m.field+'</div><h3>'+m.title+'</h3>'+
      '<div class="r">'+(m.cta||'Read')+' &nbsp;&#8594;</div>';
    rg.appendChild(a);
  });
  document.getElementById('legal').textContent='© 2026 CELESTIUM — '+D.field+' · '+D.era;

  /* mobile menu */
  var bg=document.getElementById('burger'),mn=document.getElementById('menu');
  bg.addEventListener('click',function(){var o=mn.classList.toggle('open');bg.classList.toggle('x',o);
    document.body.style.overflow=o?'hidden':'';});
  mn.querySelectorAll('a').forEach(function(a){a.addEventListener('click',function(){
    mn.classList.remove('open');bg.classList.remove('x');document.body.style.overflow='';});});
})();
</script>
</body>
</html>
